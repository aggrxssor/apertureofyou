<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
    <filter id="noise-filter">
        <feTurbulence type="fractalNoise" baseFrequency="1.12" numOctaves="4" stitchTiles="stitch"></feTurbulence>
        <feColorMatrix type="saturate" values="0"></feColorMatrix>
        <feComponentTransfer>
            <feFuncR type="linear" slope="0.58"></feFuncR>
            <feFuncG type="linear" slope="0.58"></feFuncG>
            <feFuncB type="linear" slope="0.58"></feFuncB>
            <feFuncA type="linear" slope="0.2"></feFuncA>
        </feComponentTransfer>
        <feComponentTransfer>
            <feFuncR type="linear" slope="1.32" intercept="-0.16"></feFuncR>
            <feFuncG type="linear" slope="1.32" intercept="-0.16"></feFuncG>
            <feFuncB type="linear" slope="1.32" intercept="-0.16"></feFuncB>
        </feComponentTransfer>
    </filter>

    <rect width="100%" height="100%" filter="url(#noise-filter)"></rect>
</svg>
