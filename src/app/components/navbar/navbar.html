<header class="site-header" 
        [ngClass]="currentHeaderClass"
        [class.glass]="isGlass" 
        [class.header-hidden]="isHidden" 
        [class.is-absolute]="isAbsolute">

    <div class="container d-flex flex-row flex-lg-column justify-content-between align-items-center py-3 pt-lg-4 pb-lg-2">
        
        <h1 class="site-title m-0 mb-lg-4 d-flex align-items-center gap-3" role="button" routerLink="/">
            <img src="assets/hero/apertureofu_b&w.png" alt="Aperture of You Logo" class="nav-logo" />
            <span>Aperture of You</span>
        </h1>

        <button class="mobile-menu-btn d-lg-none" (click)="toggleMobileMenu()" aria-label="Menu">
            &lt;
        </button>

        <nav class="navbar navbar-expand-lg w-100 p-0 position-relative d-none d-lg-flex">
                    
            <div class="collapse navbar-collapse justify-content-center w-100" id="navbarNavDropdown">
                
                <ul class="navbar-nav gap-lg-4 mt-2 align-items-center">

                    <li class="nav-item">
                        <a class="nav-link text-uppercase" routerLink="/portfolio" routerLinkActive="active" i18n>Portfolio</a>
                    </li>

                    <li class="nav-item dropdown d-flex align-items-center">
                        <a class="nav-link text-uppercase pe-1" routerLink="/gallery" routerLinkActive="active" i18n>Gallery</a>
                        <a class="nav-link dropdown-toggle dropdown-toggle-split ps-1" role="button" data-bs-toggle="dropdown" aria-expanded="false" style="cursor: pointer;">
                            <span class="visually-hidden" i18n>Toggle Dropdown</span>
                        </a>
                        <ul class="dropdown-menu m-0">
                            <li><a class="dropdown-item" routerLink="/gallery" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" i18n>All</a></li>
                            <li><a class="dropdown-item" routerLink="/gallery/czechia" routerLinkActive="active" i18n>Czechia</a></li>
                            <li><a class="dropdown-item" routerLink="/gallery/hungary" routerLinkActive="active" i18n>Hungary</a></li>
                            <li><a class="dropdown-item" routerLink="/gallery/morocco" routerLinkActive="active" i18n>Morocco</a></li>
                            <li><a class="dropdown-item" routerLink="/gallery/slovakia" routerLinkActive="active" i18n>Slovakia</a></li>
                            <li><a class="dropdown-item" routerLink="/gallery/spain" routerLinkActive="active" i18n>Spain</a></li>
                        </ul>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-uppercase" routerLink="/services" routerLinkActive="active" i18n>Services</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-uppercase" routerLink="/contact" routerLinkActive="active" i18n>Contact</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-uppercase" routerLink="/about" routerLinkActive="active" i18n>About</a>
                    </li>

                </ul>

                <div class="nav-lang-wrapper mt-4 mt-lg-0">
                    <div class="nav-lang-switcher">
                        <button type="button" class="nav-lang-btn active" (click)="switchLanguage('en')">
                            <img src="assets/flag-for-flag-united-kingdom-svgrepo-com.svg" class="nav-flag-icon" alt="English">
                            EN
                        </button>
                        <span class="nav-lang-divider">|</span>
                        <button type="button" class="nav-lang-btn" (click)="switchLanguage('hu')">
                            <img src="assets/flag-for-flag-hungary-svgrepo-com.svg" class="nav-flag-icon" alt="Hungarian">
                            HU
                        </button>
                    </div>
                </div>

            </div>
        </nav>
    </div>
</header>

<div class="mobile-slider-glass-bar" [class.open]="isMobileMenuOpen" (click)="closeMobileMenu()">
    <span class="slider-close-icon">&gt;</span>
</div>

<div class="mobile-slider-knockout" [class.open]="isMobileMenuOpen">
    
    <ul class="slider-links">
        <li><a routerLink="/portfolio" routerLinkActive="active" (click)="closeMobileMenu()" i18n>Portfolio</a></li>
        
        <li class="slider-accordion-wrapper">
            <div class="slider-accordion-toggle" (click)="toggleGallery()">
                <span [class.gallery-active]="isGalleryExpanded" i18n>Gallery</span>
                <span class="accordion-arrow" [class.rotated]="isGalleryExpanded">▼</span>
            </div>
            
            <div class="slider-accordion-content" [class.expanded]="isGalleryExpanded">
                <a routerLink="/gallery" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMobileMenu()" i18n>All</a>
                <a routerLink="/gallery/czechia" routerLinkActive="active" (click)="closeMobileMenu()" i18n>Czechia</a>
                <a routerLink="/gallery/hungary" routerLinkActive="active" (click)="closeMobileMenu()" i18n>Hungary</a>
                <a routerLink="/gallery/morocco" routerLinkActive="active" (click)="closeMobileMenu()" i18n>Morocco</a>
                <a routerLink="/gallery/slovakia" routerLinkActive="active" (click)="closeMobileMenu()" i18n>Slovakia</a>
                <a routerLink="/gallery/spain" routerLinkActive="active" (click)="closeMobileMenu()" i18n>Spain</a>
            </div>
        </li>

        <li><a routerLink="/services" routerLinkActive="active" (click)="closeMobileMenu()" i18n>Services</a></li>
        <li><a routerLink="/contact" routerLinkActive="active" (click)="closeMobileMenu()" i18n>Contact</a></li>
        <li><a routerLink="/about" routerLinkActive="active" (click)="closeMobileMenu()" i18n>About</a></li>
    </ul>

    <div class="slider-lang-switcher">
        <button type="button" class="nav-lang-btn" [class.active]="currentLang === 'en'" (click)="switchLanguage('en'); closeMobileMenu()">
            <img src="assets/flag-for-flag-united-kingdom-svgrepo-com.svg" class="nav-flag-icon" alt="English">
            EN
        </button>
        <span class="nav-lang-divider">|</span>
        <button type="button" class="nav-lang-btn" [class.active]="currentLang === 'hu'" (click)="switchLanguage('hu'); closeMobileMenu()">
            <img src="assets/flag-for-flag-hungary-svgrepo-com.svg" class="nav-flag-icon" alt="Hungarian">
            HU
        </button>
    </div>

</div>
