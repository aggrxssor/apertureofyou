<header class="site-header" [class.glass]="isGlass" [class.header-hidden]="isHidden" [class.is-absolute]="isAbsolute">

    <div class="container d-flex flex-column align-items-center pt-4 pb-2">
        
        <h1 class="site-title m-0 mb-4" role="button" routerLink="apertureofyou">Aperture of You</h1>

        <nav class="navbar navbar-expand-lg w-100 p-0">
            
            <button class="navbar-toggler mx-auto mt-2" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
    
            <div class="collapse navbar-collapse justify-content-center" id="navbarNavDropdown">
                <ul class="navbar-nav gap-lg-4 mt-2">

                    <li class="nav-item">
                        <a class="nav-link text-uppercase" routerLink="/portfolio" routerLinkActive="active">Portfolio</a>
                    </li>

                    <li class="nav-item dropdown d-flex align-items-center">
    
                        <a class="nav-link text-uppercase pe-1" routerLink="/gallery" routerLinkActive="active">
                            Gallery
                        </a>

                        <a class="nav-link dropdown-toggle dropdown-toggle-split ps-1" role="button" data-bs-toggle="dropdown" aria-expanded="false" style="cursor: pointer;">
                            <span class="visually-hidden">Toggle Dropdown</span>
                        </a>

                        <ul class="dropdown-menu m-0">
                            <li><a class="dropdown-item" routerLink="/gallery">All</a></li>
                            <li><a class="dropdown-item" routerLink="/gallery/czechia">Czechia</a></li>
                            <li><a class="dropdown-item" routerLink="/gallery/hungary">Hungary</a></li>
                            <li><a class="dropdown-item" routerLink="/gallery/morocco">Morocco</a></li>
                            <li><a class="dropdown-item" routerLink="/gallery/slovakia">Slovakia</a></li>
                            <li><a class="dropdown-item" routerLink="/gallery/spain">Spain</a></li>
                        </ul>

                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-uppercase" routerLink="/services" routerLinkActive="active">Services</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-uppercase" routerLink="/contact" routerLinkActive="active">Contact</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-uppercase" routerLink="/about" routerLinkActive="active">About</a>
                    </li>

                </ul>
            </div>
            
        </nav>
    </div>
</header>
